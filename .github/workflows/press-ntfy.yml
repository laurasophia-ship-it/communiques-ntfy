name: Press releases to ntfy

env:
  LANG: "C.UTF-8"
  LC_ALL: "C.UTF-8"

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python press_ntfy.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "Update seen press releases"
          git push
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "Update seen press releases"
          git push
